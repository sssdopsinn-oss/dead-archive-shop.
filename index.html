<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEAD Archive SHOP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --accent: #ff0022; --neon: #ff3366; }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: url('https://kappa.lol/u39sUL.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(80,0,10,0.55), rgba(5,5,5,0.98));
      z-index: -1;
    }

    header {
      background: rgba(8, 8, 8, 0.96);
      backdrop-filter: blur(25px);
      padding: 45px 20px 35px;
      text-align: center;
      border-bottom: 7px solid var(--accent);
    }

    h1 {
      font-size: 3.65em;
      font-weight: 900;
      letter-spacing: 14px;
      color: var(--accent);
      text-shadow: 0 0 45px var(--neon);
      text-transform: uppercase;
    }

    .subtitle { color: #999; font-size: 1.3em; letter-spacing: 7px; margin-top: 12px; }

    nav {
      background: rgba(8,8,8,0.98);
      padding: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    nav button {
      padding: 14px 24px;
      background: #111;
      border: 2px solid #333;
      color: #ddd;
      border-radius: 12px;
      font-weight: 700;
      transition: all 0.4s;
    }

    nav button.active, nav button:hover {
      background: var(--accent);
      border-color: var(--neon);
      color: white;
      box-shadow: 0 0 25px rgba(255,0,34,0.6);
    }

    .section { display: none; padding: 25px 15px; min-height: 75vh; }
    .section.active { display: block; }

    .home-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; margin-top: 25px; }
    .home-grid img { width: 100%; max-height: 280px; object-fit: cover; border-radius: 20px; }

    .search-bar { width: 100%; padding: 16px; margin: 20px 0; background: #111; border: 2px solid #444; border-radius: 14px; color: white; }

    .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 25px; }
    .product { background: rgba(15,15,15,0.95); border-radius: 22px; overflow: hidden; border: 1px solid rgba(255,0,34,0.25); transition: 0.4s; }
    .product:hover { transform: translateY(-10px); box-shadow: 0 25px 60px rgba(255,0,34,0.4); }

    .product img { width: 100%; height: 255px; object-fit: cover; }
    .price { font-size: 1.75em; font-weight: 900; color: var(--accent); }

    button.buy, .checkout-btn {
      width: 100%; padding: 18px;
      background: linear-gradient(45deg, #ff0022, #ff3366);
      border: none; color: white; border-radius: 14px;
      margin-top: 15px; font-weight: 800; font-size: 1.1em;
      transition: all 0.4s;
    }

    button.buy.added { background: #22c55e !important; transform: scale(1.06); }

    .modal-content { border: 3px solid var(--accent); box-shadow: 0 0 60px rgba(255,0,34,0.5); }

    footer { text-align: center; padding: 70px 20px 40px; color: #666; font-size: 1em; }
  </style>
</head>
<body>
  <header>
    <h1>DEAD ARCHIVE</h1>
    <p class="subtitle">OPIUM • ARCHIVE</p>
  </header>

  <nav>
    <button onclick="showSection('home')" class="active">Главная</button>
    <button onclick="showSection('shop')">Магазин</button>
    <button onclick="showSection('favorites')">❤️ Избранное (<span id="fav-count">0</span>)</button>
    <button onclick="showSection('orders')">📦 Мои заказы</button>
    <button onclick="showSection('support')">Поддержка</button>
    <button onclick="showSection('cart')">Корзина (<span id="cart-count">0</span>)</button>
  </nav>

  <!-- Главная -->
  <div id="home" class="section active">
    <div class="home-grid">
      <img src="https://kappa.lol/57GHW9" alt="new vibe">
      <img src="https://kappa.lol/nx0l01" alt="opium">
      <img src="https://kappa.lol/Abp4l7" alt="opium">
    </div>
  </div>

  <!-- Магазин -->
  <div id="shop" class="section">
    <h2 style="color:#ff3366; text-align:center; margin:20px 0 15px; font-size:2.3em;">КАТАЛОГ</h2>
    <input type="text" id="search-input" class="search-bar" placeholder="Поиск по названию...">
    
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
      <div class="filters" id="filters"></div>
      <select id="sort-select" onchange="renderShop()" style="background:#111;color:white;padding:10px;border-radius:10px;border:2px solid #444;">
        <option value="default">По умолчанию</option>
        <option value="price-low">Цена ↑</option>
        <option value="price-high">Цена ↓</option>
        <option value="name">По названию</option>
      </select>
    </div>

    <div class="product-grid" id="products"></div>
    <div class="pagination" id="pagination" style="margin:50px 0;display:flex;justify-content:center;gap:12px;flex-wrap:wrap;"></div>
  </div>

  <!-- Избранное -->
  <div id="favorites" class="section">
    <h2 style="color:#ff3366; text-align:center; margin-bottom:20px;">❤️ Избранное</h2>
    <div class="product-grid" id="favorites-grid"></div>
  </div>

  <!-- Мои заказы -->
  <div id="orders" class="section">
    <h2 style="color:#ff3366; text-align:center; margin-bottom:20px;">📦 Мои заказы</h2>
    <div id="orders-list"></div>
  </div>

  <!-- Поддержка -->
  <div id="support" class="section">
    <h2 style="color:#ff3366; text-align:center; margin-bottom:30px;">Поддержка</h2>
    <p style="font-size:1.3em; text-align:center; line-height:1.8;">
      Есть вопросы по заказу? Пиши мне напрямую.
    </p>
    <div style="text-align:center; margin-top:60px;">
      <a href="https://t.me/sssdopsinn" target="_blank" style="color:#ff3366; font-size:1.6em; text-decoration:none; font-weight:bold;">
        → Написать в поддержку ←
      </a>
    </div>
  </div>

  <!-- Корзина -->
  <div id="cart" class="section">
    <h2 style="color:#ff3366; margin-bottom:25px;">Твоя корзина</h2>
    <button onclick="clearCart()" style="margin-bottom:20px; padding:10px 20px; background:#333; border:none; color:#ddd; border-radius:8px;">Очистить корзину</button>
    <div id="cart-items"></div>
    <h3 style="margin:35px 0 20px; text-align:center;">
      Итого: <span id="total-usd">0</span>$ (<span id="total-uah">0</span> ₴)
    </h3>
    <button onclick="checkout()" class="checkout-btn">Оформить заказ</button>
  </div>

  <!-- Модальное окно -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <div class="modal-images" id="modalImages" style="display:flex;overflow-x:auto;gap:10px;padding:16px;background:#0a0a0a;"></div>
      <div class="modal-info" style="padding:26px;">
        <h2 id="modalName"></h2>
        <p class="price" id="modalPrice"></p>
        <p id="modalDesc" style="margin:15px 0; line-height:1.5;"></p>

        <p>Размер:</p>
        <div id="size-buttons" style="display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 15px;"></div>

        <p>Количество:</p>
        <input type="number" id="quantity" value="1" min="1" style="width:90px;padding:10px;background:#111;color:white;border:2px solid #444;border-radius:10px;">

        <button onclick="addCurrentToCart()" class="buy" style="margin-top:20px;">Добавить в корзину</button>
      </div>
    </div>
  </div>

  <footer>
    © 2026 Dead Archive Shop<br>
    <span style="color:#ff3366;">Создатель бота очень любит Дашу ❤️</span>
  </footer>

  <script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    const USD_TO_UAH = 41;
    let cart = [];
    let favorites = [];
    let orders = [];
    let currentProduct = null;
    let currentPage = 1;
    let currentCategory = 'all';
    let searchQuery = '';
    let selectedSize = '';

    const itemsPerPage = 6;

    const products = [
      {id:1, name:"Футболка Mowalola Double Sweat", price:50, category:"Футболки", img:["https://kappa.lol/cLC3CA.jpg","https://kappa.lol/3sjJSI.jpg","https://kappa.lol/fJbkmo.jpg","https://kappa.lol/Nu52GS.jpg"], desc:"Футболка Mowalola с двойным принтом", sizes:["S","M","L","XL"]},
      {id:2, name:"Зип-Худи Grailz Project G/R", price:75, category:"Худи", img:["https://kappa.lol/IEzPpD.jpg","https://kappa.lol/VGOyOY.jpg","https://kappa.lol/kApzXs.jpg"], desc:"Тёплый зип-худи в стиле Grailz", sizes:["M","L","XL"]},
      {id:3, name:"Джинсы Acne Studios", price:80, category:"Штаны", img:["https://kappa.lol/6aKBo5.jpg"], desc:"Широкие чёрные джинсы", sizes:["S","M","L","XL"]},
      {id:4, name:"Худи Vetements Polizei", price:80, category:"Худи", img:["https://kappa.lol/9vC7xw.jpg","https://kappa.lol/j00CDM.jpg","https://kappa.lol/A8IFEN.jpg","https://kappa.lol/5w4C3w.jpg"], desc:"Культовая худи с полицейским принтом", sizes:["M","L","XL"]},
      {id:5, name:"Штаны Maison Margiela", price:60, category:"Штаны", img:["https://kappa.lol/upj6ke.jpg","https://kappa.lol/LJY5sq.jpg","https://kappa.lol/6Shbdt.jpg","https://kappa.lol/EzY4yI.jpg"], desc:"Стильные штаны Maison Margiela", sizes:["S","M","L"]},
      {id:6, name:"Шорты Acne Studios", price:48, category:"Шорты", img:["https://kappa.lol/UDQ5kU.jpg","https://kappa.lol/JMHCaM.jpg","https://kappa.lol/HttpQq.jpg","https://kappa.lol/5nBYQa.jpg"], desc:"Комфортные шорты Acne Studios", sizes:["M","L"]},
      {id:7, name:"Худи Acne Studios Stockholm 1996", price:75, category:"Худи", img:["https://kappa.lol/WMQfJK.jpg","https://kappa.lol/pGk89F.jpg","https://kappa.lol/V9BdIW.jpg"], desc:"Худи в стиле 1996 года", sizes:["S","M","L","XL"]},
      {id:8, name:"Футболка Balenciaga х Under Armour", price:45, category:"Футболки", img:["https://kappa.lol/AHnTaz.jpg","https://kappa.lol/6s04Ug.jpg","https://kappa.lol/TFNnNh.jpg"], desc:"Баленсиага в коллабе с Андер Армор", sizes:["M","L"]},
      {id:9, name:"Футболка Enfants Riches Deprimes", price:50, category:"Футболки", img:["https://kappa.lol/EYQ7dJ.jpg","https://kappa.lol/MXloXK.jpg","https://kappa.lol/ZtJgQS.jpg"], desc:"Очень качественная футболка Enfants Riches Deprimes", sizes:["S","M","L"]},
      {id:10, name:"Футболка Erd Melancholy Rich Second Generation", price:50, category:"Футболки", img:["https://kappa.lol/o0PLJt.jpg","https://kappa.lol/0jmAGU.jpg","https://kappa.lol/1LZ77E.jpg"], desc:"Футболка Erd Melancholy Rich Second Generation", sizes:["M","L","XL"]},
      {id:11, name:"Футболка Houli Crab ERD23FW", price:50, category:"Футболки", img:["https://kappa.lol/y5Wc2G.jpg","https://kappa.lol/50NFto.jpg","https://kappa.lol/WZajI0.jpg"], desc:"Очень стильная футболка Houli Crab ERD", sizes:["S","M","L"]}
    ];

    function loadData() {
      if (localStorage.getItem('deadarchive_cart')) cart = JSON.parse(localStorage.getItem('deadarchive_cart'));
      if (localStorage.getItem('deadarchive_favorites')) favorites = JSON.parse(localStorage.getItem('deadarchive_favorites'));
      if (localStorage.getItem('deadarchive_orders')) orders = JSON.parse(localStorage.getItem('deadarchive_orders'));
      updateCart();
      updateFavCount();
    }

    function saveData() {
      localStorage.setItem('deadarchive_cart', JSON.stringify(cart));
      localStorage.setItem('deadarchive_favorites', JSON.stringify(favorites));
      localStorage.setItem('deadarchive_orders', JSON.stringify(orders));
    }

    function updateCart() {
      document.getElementById('cart-count').textContent = cart.length;
      const container = document.getElementById('cart-items');
      container.innerHTML = '';
      let total = 0;

      cart.forEach((item, i) => {
        total += item.price * (item.quantity || 1);
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
          <img src="${item.img[0]}" style="width:70px;height:70px;object-fit:cover;border-radius:10px;">
          <span style="flex:1;margin-left:15px;">${item.name} ${item.size ? `(${item.size})` : ''} × ${item.quantity || 1}</span>
          <span style="margin-right:15px;color:#ff3366;">${item.price}$</span>
          <button onclick="removeFromCart(${i})" style="color:#ff1a6b;background:none;border:none;font-size:26px;cursor:pointer;">✕</button>
        `;
        container.appendChild(div);
      });

      document.getElementById('total-usd').textContent = total;
      document.getElementById('total-uah').textContent = Math.round(total * USD_TO_UAH);
    }

    function removeFromCart(i) {
      cart.splice(i, 1);
      saveData();
      updateCart();
    }

    function clearCart() {
      if (confirm("Очистить всю корзину?")) {
        cart = [];
        saveData();
        updateCart();
      }
    }

    function updateFavCount() {
      document.getElementById('fav-count').textContent = favorites.length;
    }

    function toggleFavorite() {
      if (!currentProduct) return;
      const index = favorites.findIndex(f => f.id === currentProduct.id);
      if (index === -1) {
        favorites.push(currentProduct);
        Telegram.WebApp.showToast("❤️ Добавлено в избранное");
      } else {
        favorites.splice(index, 1);
        Telegram.WebApp.showToast("💔 Убрано из избранного");
      }
      saveData();
      updateFavCount();
      if (document.getElementById('favorites').classList.contains('active')) renderFavorites();
    }

    function renderFavorites() {
      const cont = document.getElementById('favorites-grid');
      cont.innerHTML = '';
      if (favorites.length === 0) {
        cont.innerHTML = '<p style="text-align:center;color:#666;padding:50px;">Избранное пусто</p>';
        return;
      }
      favorites.forEach(p => {
        const div = document.createElement('div');
        div.className = 'product';
        div.onclick = () => openModal(p);
        div.innerHTML = `<img src="${p.img[0]}"><div class="product-info"><h3>${p.name}</h3><p class="price">${p.price}$</p></div>`;
        cont.appendChild(div);
      });
    }

    function renderOrders() {
      const cont = document.getElementById('orders-list');
      cont.innerHTML = '';
      if (orders.length === 0) {
        cont.innerHTML = '<p style="text-align:center;color:#666;padding:50px;">Пока нет заказов</p>';
        return;
      }
      orders.forEach(order => {
        const div = document.createElement('div');
        div.style.background = "rgba(20,20,20,0.9)";
        div.style.padding = "15px";
        div.style.margin = "12px 0";
        div.style.borderRadius = "16px";
        div.innerHTML = `
          <small>${new Date(order.date).toLocaleString('ru-RU')}</small><br>
          <strong>Сумма: ${order.total}$</strong><br>
          ${order.items.map(i => `• ${i.name} ${i.size ? `(${i.size})` : ''} × ${i.quantity||1}`).join('<br>')}
        `;
        cont.appendChild(div);
      });
    }

    function getFilteredProducts() {
      let filtered = products;
      if (currentCategory !== 'all') filtered = filtered.filter(p => p.category === currentCategory);
      if (searchQuery) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
      return filtered;
    }

    function renderFilters() {
      const cats = ['all', 'Футболки', 'Худи', 'Штаны', 'Шорты'];
      const cont = document.getElementById('filters');
      cont.innerHTML = '';
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `filter-btn ${cat === currentCategory ? 'active' : ''}`;
        btn.textContent = cat === 'all' ? 'Все' : cat;
        btn.onclick = () => {
          currentCategory = cat;
          currentPage = 1;
          renderFilters();
          renderShop();
        };
        cont.appendChild(btn);
      });
    }

    function renderShop() {
      const cont = document.getElementById('products');
      cont.innerHTML = '';
      let filtered = getFilteredProducts();

      const sortType = document.getElementById('sort-select').value;
      if (sortType === 'price-low') filtered.sort((a,b) => a.price - b.price);
      if (sortType === 'price-high') filtered.sort((a,b) => b.price - a.price);
      if (sortType === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));

      const start = (currentPage - 1) * itemsPerPage;
      const slice = filtered.slice(start, start + itemsPerPage);

      slice.forEach(p => {
        const div = document.createElement('div');
        div.className = 'product';
        div.onclick = () => openModal(p);
        div.innerHTML = `
          <img src="${p.img[0]}">
          <div class="product-info">
            <h3>${p.name}</h3>
            <p class="price">${p.price}$</p>
          </div>
        `;
        cont.appendChild(div);
      });
      renderPagination(filtered.length);
    }

    function renderPagination(total) {
      const pages = Math.ceil(total / itemsPerPage);
      const cont = document.getElementById('pagination');
      cont.innerHTML = '';
      for (let i = 1; i <= pages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.style.padding = "12px 20px";
        btn.style.background = i === currentPage ? "#ff0022" : "#111";
        btn.style.border = "2px solid #444";
        btn.style.color = "#ddd";
        btn.style.borderRadius = "12px";
        btn.onclick = () => { currentPage = i; renderShop(); };
        cont.appendChild(btn);
      }
    }

    function openModal(p) {
      currentProduct = p;
      selectedSize = p.sizes ? p.sizes[0] : '';
      document.getElementById('modal').style.display = 'flex';
      document.getElementById('modalName').textContent = p.name;
      document.getElementById('modalPrice').innerHTML = `${p.price}$ <span style="color:#ff3366">(${(p.price*USD_TO_UAH)} ₴)</span>`;
      document.getElementById('modalDesc').textContent = p.desc;

      const sizeDiv = document.getElementById('size-buttons');
      sizeDiv.innerHTML = '';
      if (p.sizes) {
        p.sizes.forEach(size => {
          const btn = document.createElement('button');
          btn.textContent = size;
          btn.style.padding = "10px 18px";
          btn.style.background = size === selectedSize ? "#ff0022" : "#222";
          btn.style.border = "2px solid #444";
          btn.style.color = "white";
          btn.style.borderRadius = "10px";
          btn.onclick = () => { selectedSize = size; openModal(p); };
          sizeDiv.appendChild(btn);
        });
      }
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function addCurrentToCart() {
      if (!currentProduct) return;
      const qty = parseInt(document.getElementById('quantity').value) || 1;

      const item = { ...currentProduct, size: selectedSize, quantity: qty };

      cart.push(item);
      saveData();
      updateCart();

      const btn = document.querySelector('#modal .buy');
      btn.textContent = "✓ Добавлено";
      btn.classList.add('added');

      Telegram.WebApp.showToast(`✅ ${currentProduct.name}`);

      setTimeout(() => {
        btn.textContent = "Добавить в корзину";
        btn.classList.remove('added');
        closeModal();
      }, 1600);
    }

    async function checkout() {
      if (cart.length === 0) return Telegram.WebApp.showAlert("Корзина пустая");

      const total = cart.reduce((sum, item) => sum + item.price * (item.quantity || 1), 0);

      orders.unshift({ date: new Date().toISOString(), items: [...cart], total: total });
      saveData();
      renderOrders();

      const orderList = cart.map(item => `• ${item.name} ${item.size ? `(${item.size})` : ''} × ${item.quantity || 1}`).join('\n');

      const user = Telegram.WebApp.initDataUnsafe?.user || {};
      const name = user.username ? `@${user.username}` : user.first_name || "Пользователь";

      const text = `🛍 Новый заказ!\n\n👤 ${name}\n🆔 ${user.id}\n\n${orderList}\n\n💰 Итого: ${total}$ (${Math.round(total * USD_TO_UAH)} ₴)`;

      try {
        await fetch('https://api.telegram.org/bot8472467963:AAGbG_oLzzwXmN_zMWOVEvsrUx4jsY1Hb-8/sendMessage', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ chat_id: 5882542766, text: text, parse_mode: "Markdown" })
        });
      } catch(e) {}

      Telegram.WebApp.showAlert(`✅ Заказ отправлен!\nИтого: ${total}$`);
      cart = [];
      saveData();
      updateCart();
      showSection('home');
    }

    function showSection(sec) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(sec).classList.add('active');

      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => {
        if (b.getAttribute('onclick').includes(`'${sec}'`)) b.classList.add('active');
      });

      if (sec === 'shop') { currentPage = 1; renderFilters(); renderShop(); }
      if (sec === 'favorites') renderFavorites();
      if (sec === 'orders') renderOrders();
    }

    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value;
      currentPage = 1;
      renderShop();
    });

    loadData();
    showSection('home');
  </script>
</body>
</html>
