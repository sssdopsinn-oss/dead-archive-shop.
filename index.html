<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEAD Archive SHOP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --red: #c00; --dark: #0a0a0a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: url('https://kappa.lol/u39sUL.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #ddd;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.78);
      z-index: -1;
    }

    header {
      background: rgba(17, 17, 17, 0.95);
      backdrop-filter: blur(12px);
      padding: 25px;
      text-align: center;
      border-bottom: 5px solid var(--red);
    }
    h1 {
      color: #ff3333;
      font-size: 2.7em;
      letter-spacing: 4px;
      text-shadow: 0 0 25px rgba(255, 50, 50, 0.7);
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 18px;
      background: rgba(26, 26, 26, 0.95);
      backdrop-filter: blur(12px);
      justify-content: center;
    }
    nav button {
      padding: 14px 24px;
      background: rgba(34, 34, 34, 0.9);
      border: 2px solid #555;
      color: #ddd;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    nav button:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(192, 0, 0, 0.5);
    }
    nav button.active {
      background: var(--red);
      border-color: var(--red);
      color: white;
      transform: scale(1.05);
    }

    .section { display: none; padding: 25px; min-height: 75vh; }
    .section.active { display: block; }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 22px;
    }
    .product {
      background: rgba(26, 26, 26, 0.95);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(192, 0, 0, 0.3);
      transition: all 0.4s ease;
    }
    .product:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 35px rgba(192, 0, 0, 0.6);
    }
    .product img {
      width: 100%;
      height: 235px;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .product:hover img {
      transform: scale(1.08);
    }
    .product-info {
      padding: 16px;
      text-align: center;
    }
    .price {
      color: #ff3333;
      font-size: 1.5em;
      font-weight: bold;
    }

    button.buy {
      width: 100%;
      padding: 15px;
      background: var(--red);
      border: none;
      color: white;
      border-radius: 10px;
      margin-top: 12px;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    button.buy:hover {
      background: #ff5555;
      transform: scale(1.05);
    }
    button.buy.added {
      background: #00c853;
      transform: scale(1.1);
    }

    .cart-item {
      display: flex;
      gap: 15px;
      background: rgba(26, 26, 26, 0.95);
      padding: 15px;
      margin: 12px 0;
      border-radius: 14px;
      border: 1px solid rgba(192, 0, 0, 0.3);
    }
    .cart-item img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 8px;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }
  </style>
</head>
<body>

  <header>
    <h1>DEAD ARCHIVE</h1>
    <p>реплика • культовая шмотка</p>
  </header>

  <nav>
    <button onclick="showSection('home')" class="active">Главная</button>
    <button onclick="showSection('shop')">Магазин</button>
    <button onclick="showSection('cart')">Корзина (<span id="cart-count">0</span>)</button>
  </nav>

  <!-- Главная -->
  <div id="home" class="section active">
    <h2 style="text-align:center; color:#ff3333; margin:90px 0 40px; font-size:2.6em;">ДОБРО ПОЖАЛОВАТЬ В КУЛЬТ</h2>
    <p style="text-align:center; font-size:1.3em;">Только топовые реплики Archive и нефор шмота</p>
  </div>

  <!-- Магазин -->
  <div id="shop" class="section">
    <h2 style="color:#ff3333; margin-bottom:30px;">Каталог шмота</h2>
    <div class="product-grid" id="products"></div>
  </div>

  <!-- Корзина -->
  <div id="cart" class="section">
    <h2 style="color:#ff3333; margin-bottom:25px;">Твоя корзина</h2>
    <div id="cart-items"></div>
    <h3 style="margin:35px 0 20px; text-align:center;">Итого: <span id="total">0</span>$</h3>
    <button onclick="checkout()" style="width:100%; padding:18px; background:#c00; border:none; color:white; border-radius:12px; font-size:1.2em;">
      Оформить заказ
    </button>
  </div>

  <footer>
    © 2026 Dead Archive Shop
  </footer>

  <script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    let cart = [];

    const products = [
      {id:1, name:"Футболка Mowalola Double Sweat", price:40, img:"https://kappa.lol/cLC3CA.jpg"},
      {id:2, name:"Зип-Худи Grailz Project G/R", price:75, img:"https://kappa.lol/IEzPpD.jpg"},
      {id:3, name:"Джинсы Acne Studios", price:80, img:"https://kappa.lol/6aKBo5.jpg"},
      {id:4, name:"Худи Vetements Polizei", price:90, img:"https://kappa.lol/aCimHO.jpg"},
      {id:5, name:"Штаны Maison Margiela", price:90, img:"https://kappa.lol/upj6ke.jpg"},
      {id:6, name:"Шорты Acne Studios", price:90, img:"https://kappa.lol/UDQ5kU.jpg"},
      {id:7, name:"Худи Acne Studios Stockholm 1996", price:90, img:"https://kappa.lol/WMQfJK.jpg"}
    ];

    function renderProducts() {
      const container = document.getElementById('products');
      container.innerHTML = '';
      products.forEach(p => {
        const div = document.createElement('div');
        div.className = 'product';
        div.innerHTML = `
          <img src="${p.img}">
          <div class="product-info">
            <h3>${p.name}</h3>
            <p class="price">${p.price}$</p>
            <button class="buy" onclick="addToCart(${p.id}, this)">В корзину</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function addToCart(id, btn) {
      const product = products.find(p => p.id === id);
      if (!product) return;

      cart.push(product);
      updateCart();

      const original = btn.textContent;
      btn.textContent = "✓ Добавлено";
      btn.classList.add('added');

      setTimeout(() => {
        btn.textContent = original;
        btn.classList.remove('added');
      }, 1600);

      Telegram.WebApp.showToast(`✅ Добавлено в корзину: ${product.name}`);
    }

    function updateCart() {
      document.getElementById('cart-count').textContent = cart.length;
      const container = document.getElementById('cart-items');
      container.innerHTML = '';
      let total = 0;

      cart.forEach(item => {
        total += item.price;
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
          <img src="${item.img}" style="width:60px;height:60px;object-fit:cover;border-radius:8px;">
          <span style="flex:1;margin-left:12px;">${item.name} — ${item.price}$</span>
          <button onclick="removeFromCart(${cart.indexOf(item)})" style="color:#ff5555;background:none;border:none;font-size:24px;">✕</button>
        `;
        container.appendChild(div);
      });

      document.getElementById('total').textContent = total;
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      updateCart();
    }

    function checkout() {
      if (cart.length === 0) {
        Telegram.WebApp.showAlert("Корзина пустая");
        return;
      }

      Telegram.WebApp.showAlert("✅ Заказ отправлен менеджеру!\n\nОжидай сообщения.");

      cart = [];
      updateCart();
    }

    function showSection(section) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(section).classList.add('active');
      
      document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(btn => {
        if (btn.getAttribute('onclick').includes(`'${section}'`)) btn.classList.add('active');
      });
    }

    renderProducts();
    showSection('home');
  </script>
</body>
</html>
