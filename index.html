<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEAD Archive SHOP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --red: #c00; --dark: #0a0a0a; --gray: #1a1a1a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: url('https://kappa.lol/u39sUL.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #ddd;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.82);
      z-index: -1;
    }

    header {
      background: rgba(17, 17, 17, 0.95);
      backdrop-filter: blur(10px);
      padding: 22px;
      text-align: center;
      border-bottom: 4px solid var(--red);
    }
    h1 { color: #ff3333; font-size: 2.5em; letter-spacing: 3px; }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 15px;
      background: rgba(26, 26, 26, 0.95);
      backdrop-filter: blur(10px);
      justify-content: center;
    }
    nav button {
      padding: 13px 20px;
      background: rgba(34, 34, 34, 0.9);
      border: 2px solid #444;
      color: #ddd;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }
    nav button.active {
      background: var(--red);
      border-color: var(--red);
      color: white;
    }

    .section { display: none; padding: 20px; min-height: 75vh; }
    .section.active { display: block; }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 18px;
    }
    .product {
      background: rgba(26, 26, 26, 0.95);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(192, 0, 0, 0.3);
    }
    .product img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
    .product-info {
      padding: 15px;
      text-align: center;
    }
    .price { color: #ff3333; font-size: 1.45em; font-weight: bold; }

    button.buy {
      width: 100%;
      padding: 14px;
      background: var(--red);
      border: none;
      color: white;
      border-radius: 10px;
      margin-top: 10px;
      transition: all 0.3s;
    }
    button.buy.added {
      background: #00c853;
      transform: scale(1.05);
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(26, 26, 26, 0.95);
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
    }

    footer { text-align: center; padding: 30px; color: #666; }
  </style>
</head>
<body>

  <header>
    <h1>DEAD ARCHIVE</h1>
    <p>реплика • культовая шмотка</p>
  </header>

  <nav>
    <button onclick="showSection('home')" class="active">Главная</button>
    <button onclick="showSection('shop')">Магазин</button>
    <button onclick="showSection('cart')">Корзина (<span id="cart-count">0</span>)</button>
  </nav>

  <div id="home" class="section active">
    <h2 style="text-align:center; color:#ff3333; margin:80px 0 30px; font-size:2.4em;">ДОБРО ПОЖАЛОВАТЬ В КУЛЬТ</h2>
    <p style="text-align:center; font-size:1.25em;">Только топовые реплики Archive и нефор шмота</p>
  </div>

  <div id="shop" class="section">
    <h2 style="color:#ff3333; margin-bottom:25px;">Каталог шмота</h2>
    <div class="product-grid" id="products"></div>
  </div>

  <div id="cart" class="section">
    <h2 style="color:#ff3333; margin-bottom:20px;">Твоя корзина</h2>
    <div id="cart-items"></div>
    <h3 style="margin:30px 0 15px; text-align:center;">Итого: <span id="total">0</span>$</h3>
    <button onclick="checkout()" style="width:100%; padding:16px; background:#c00; border:none; color:white; border-radius:12px; font-size:1.15em;">
      Оформить заказ
    </button>
  </div>

  <footer>© 2026 Dead Archive Shop</footer>

  <script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    let cart = [];

    const products = [
      {id:1, name:"Футболка Mowalola Double Sweat", price:40, img:"https://kappa.lol/cLC3CA.jpg"},
      {id:2, name:"Зип-Худи Grailz Project G/R", price:75, img:"https://kappa.lol/IEzPpD.jpg"},
      {id:3, name:"Джинсы Acne Studios", price:80, img:"https://kappa.lol/6aKBo5.jpg"},
      {id:4, name:"Худи Vetements Polizei", price:90, img:"https://kappa.lol/aCimHO.jpg"}
    ];

    function renderProducts() {
      const container = document.getElementById('products');
      container.innerHTML = '';
      products.forEach(p => {
        const div = document.createElement('div');
        div.className = 'product';
        div.innerHTML = `
          <img src="${p.img}">
          <div class="product-info">
            <h3>${p.name}</h3>
            <p class="price">${p.price}$</p>
            <button class="buy" onclick="addToCart(${p.id}, this)">В корзину</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function addToCart(id, button) {
      const product = products.find(p => p.id === id);
      if (!product) return;

      cart.push(product);
      updateCart();

      // Красивая анимация кнопки
      const originalText = button.textContent;
      button.textContent = "✓ Добавлено";
      button.classList.add('added');

      setTimeout(() => {
        button.textContent = originalText;
        button.classList.remove('added');
      }, 1500);

      Telegram.WebApp.showToast(`✅ Добавлено в корзину: ${product.name}`);
    }

    function updateCart() {
      document.getElementById('cart-count').textContent = cart.length;
      const container = document.getElementById('cart-items');
      container.innerHTML = '';
      let total = 0;

      cart.forEach((item, index) => {
        total += item.price;
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
          <span>${item.name} — ${item.price}$</span>
          <button onclick="removeFromCart(${index})" style="color:#ff5555;background:none;border:none;font-size:22px;">✕</button>
        `;
        container.appendChild(div);
      });

      document.getElementById('total').textContent = total;
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      updateCart();
    }

    function checkout() {
      if (cart.length === 0) {
        Telegram.WebApp.showAlert("Корзина пустая");
        return;
      }

      Telegram.WebApp.sendData(JSON.stringify({
        action: "new_order",
        order: cart,
        total: document.getElementById('total').textContent,
        user: Telegram.WebApp.initDataUnsafe.user
      }));

      Telegram.WebApp.showAlert("✅ Заказ отправлен менеджеру!\n\nОжидай сообщения.");

      cart = [];
      updateCart();
    }

    function showSection(section) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(section).classList.add('active');
      
      document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(btn => {
        if (btn.getAttribute('onclick').includes(`'${section}'`)) btn.classList.add('active');
      });
    }

    renderProducts();
    showSection('home');
  </script>
</body>
</html>
