<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEAD Archive SHOP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --red: #c00; --dark: #0a0a0a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: url('https://kappa.lol/u39sUL.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #ddd;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.82);
      z-index: -1;
    }
    header {
      background: rgba(17, 17, 17, 0.95);
      backdrop-filter: blur(10px);
      padding: 25px;
      text-align: center;
      border-bottom: 5px solid var(--red);
    }
    h1 { color: #ff3333; font-size: 2.6em; letter-spacing: 3px; }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 18px;
      background: rgba(26, 26, 26, 0.95);
      backdrop-filter: blur(10px);
      justify-content: center;
    }
    nav button {
      padding: 14px 24px;
      background: rgba(34, 34, 34, 0.9);
      border: 2px solid #555;
      color: #ddd;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    nav button:hover { transform: translateY(-3px); }
    nav button.active {
      background: var(--red);
      border-color: var(--red);
      color: white;
    }

    .section { display: none; padding: 25px; min-height: 75vh; }
    .section.active { display: block; }

    /* ==================== ГЛАВНАЯ ==================== */
    #home {
      text-align: center;
      padding-top: 60px;
    }
    .main-title {
      font-size: 3.2em;
      font-weight: bold;
      color: #ff3333;
      text-shadow: 
        0 0 20px #ff3333,
        0 0 40px #ff0000,
        0 0 60px #c00;
      animation: glow 2s ease-in-out infinite alternate;
      margin-bottom: 20px;
      letter-spacing: 4px;
    }
    .sub-text {
      font-size: 1.45em;
      color: #ff6666;
      margin: 20px 0 50px;
      text-shadow: 0 0 15px rgba(255, 100, 100, 0.7);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes glow {
      from { text-shadow: 0 0 20px #ff3333, 0 0 40px #ff0000; }
      to { text-shadow: 0 0 30px #ff3333, 0 0 60px #ff0000, 0 0 80px #c00; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }

    /* Пагинация и товары */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 22px;
    }
    .product {
      background: rgba(26, 26, 26, 0.95);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(192, 0, 0, 0.3);
      transition: all 0.4s ease;
      cursor: pointer;
    }
    .product:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 35px rgba(192, 0, 0, 0.6);
    }
    .product img {
      width: 100%;
      height: 235px;
      object-fit: cover;
    }
    .product-info {
      padding: 16px;
      text-align: center;
    }
    .price { color: #ff3333; font-size: 1.5em; font-weight: bold; }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 40px 0 20px;
    }
    .pagination button {
      padding: 12px 20px;
      background: rgba(34,34,34,0.9);
      border: 2px solid #555;
      color: #ddd;
      border-radius: 10px;
      cursor: pointer;
    }
    .pagination button.active, .pagination button:hover {
      background: var(--red);
      border-color: var(--red);
    }

    /* Модальное окно и корзина */
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
    .modal-content { background: #1a1a1a; max-width: 500px; width: 90%; border-radius: 18px; overflow: hidden; }
    .modal-images { display: flex; overflow-x: auto; gap: 5px; padding: 10px; background: #111; }
    .modal-images img { width: 100%; height: 300px; object-fit: cover; border-radius: 12px; flex-shrink: 0; }
    .modal-info { padding: 20px; }
    .close { position: absolute; top: 15px; right: 20px; font-size: 30px; color: #fff; cursor: pointer; }

    button.buy, .checkout-btn {
      width: 100%; padding: 16px; background: var(--red); border: none; color: white; border-radius: 12px; margin-top: 10px;
      transition: all 0.3s ease;
    }
    button.buy.added { background: #00c853; transform: scale(1.08); }
    .checkout-btn.sending { background: #00c853; transform: scale(1.03); }

    .cart-item {
      display: flex; align-items: center; background: rgba(26,26,26,0.95); padding: 14px; margin: 12px 0; border-radius: 12px;
    }

    /* Футер с любовью к Даше */
    footer {
      text-align: center;
      padding: 40px 20px 30px;
      color: #666;
      font-size: 0.95em;
    }
    .love-dash {
      color: #ff3366;
      font-size: 1.05em;
      margin-top: 12px;
      animation: heartbeat 1.8s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
  </style>
</head>
<body>

  <header>
    <h1>DEAD ARCHIVE</h1>
    <p>реплика • культовая шмотка</p>
  </header>

  <nav>
    <button onclick="showSection('home')" class="active">Главная</button>
    <button onclick="showSection('shop')">Магазин</button>
    <button onclick="showSection('cart')">Корзина (<span id="cart-count">0</span>)</button>
  </nav>

  <!-- ==================== ГЛАВНАЯ ==================== -->
  <div id="home" class="section active">
    <h2 class="main-title">DEAD CULT</h2>
    <p class="sub-text">Здесь рождается стиль.<br>Здесь умирает скука.</p>
    
    <div style="margin: 60px 0; font-size: 1.3em; color: #ff5555; text-shadow: 0 0 20px #c00;">
      Только для тех, кто понимает.
    </div>
  </div>

  <!-- ==================== МАГАЗИН ==================== -->
  <div id="shop" class="section">
    <h2 style="color:#ff3333; margin-bottom:30px;">Каталог шмота</h2>
    <div class="product-grid" id="products"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- ==================== КОРЗИНА ==================== -->
  <div id="cart" class="section">
    <h2 style="color:#ff3333; margin-bottom:25px;">Твоя корзина</h2>
    <div id="cart-items"></div>
    <h3 style="margin:35px 0 20px; text-align:center;">Итого: <span id="total">0</span>$</h3>
    <button id="checkoutBtn" onclick="checkout()" class="checkout-btn">
      Оформить заказ
    </button>
  </div>

  <!-- Модальное окно -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <div class="modal-images" id="modalImages"></div>
      <div class="modal-info">
        <h2 id="modalName"></h2>
        <p class="price" id="modalPrice"></p>
        <p id="modalDesc"></p>
        <button onclick="addCurrentToCart()" class="buy">Добавить в корзину</button>
      </div>
    </div>
  </div>

  <footer>
    © 2026 Dead Archive Shop<br>
    <span class="love-dash">Создатель канала очень любит Дашу ❤️</span>
  </footer>

  <script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    let cart = [];
    let currentProduct = null;
    let currentPage = 1;
    const itemsPerPage = 6;

    const products = [
      {id:1, name:"Футболка Mowalola Double Sweat", price:40, img:["https://kappa.lol/cLC3CA.jpg"], desc:"Классическая футболка с двойным принтом"},
      {id:2, name:"Зип-Худи Grailz Project G/R", price:75, img:["https://kappa.lol/IEzPpD.jpg"], desc:"Тёплый зип-худи в стиле Grailz"},
      {id:3, name:"Джинсы Acne Studios", price:80, img:["https://kappa.lol/6aKBo5.jpg"], desc:"Широкие чёрные джинсы"},
      {id:4, name:"Худи Vetements Polizei", price:90, img:["https://kappa.lol/aCimHO.jpg"], desc:"Культовая худи с полицейским принтом"},
      {id:5, name:"Штаны Maison Margiela", price:90, img:["https://kappa.lol/upj6ke.jpg"], desc:"Стильные штаны Maison Margiela"},
      {id:6, name:"Шорты Acne Studios", price:90, img:["https://kappa.lol/UDQ5kU.jpg"], desc:"Комфортные шорты"},
      {id:7, name:"Худи Acne Studios Stockholm 1996", price:90, img:["https://kappa.lol/WMQfJK.jpg"], desc:"Худи в стиле 1996 года"},
      {id:8, name:"Bomber Rick Owens", price:110, img:["https://kappa.lol/random1.jpg"], desc:"Тяжёлый бомбер Rick Owens"},
      {id:9, name:"Джинсы Balenciaga", price:95, img:["https://kappa.lol/random2.jpg"], desc:"Оверсайз джинсы Balenciaga"},
      {id:10, name:"Худи Chrome Hearts", price:120, img:["https://kappa.lol/random3.jpg"], desc:"Кросс с черепами"},
      {id:11, name:"Футболка Undercover", price:65, img:["https://kappa.lol/random4.jpg"], desc:"Undercover x fragment"},
      {id:12, name:"Штаны Number (N)ine", price:85, img:["https://kappa.lol/random5.jpg"], desc:"Винтажные штаны"}
    ];

    function getPaginatedProducts(page) {
      const start = (page - 1) * itemsPerPage;
      return products.slice(start, start + itemsPerPage);
    }

    function renderPagination(totalPages) {
      const container = document.getElementById('pagination');
      container.innerHTML = '';
      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.classList.toggle('active', i === currentPage);
        btn.onclick = () => { currentPage = i; renderShop(); };
        container.appendChild(btn);
      }
    }

    function renderShop() {
      const container = document.getElementById('products');
      container.innerHTML = '';
      const currentProducts = getPaginatedProducts(currentPage);

      currentProducts.forEach(p => {
        const div = document.createElement('div');
        div.className = 'product';
        div.onclick = () => openModal(p);
        div.innerHTML = `
          <img src="${p.img[0]}">
          <div class="product-info">
            <h3>${p.name}</h3>
            <p class="price">${p.price}$</p>
          </div>
        `;
        container.appendChild(div);
      });

      const totalPages = Math.ceil(products.length / itemsPerPage);
      renderPagination(totalPages);
    }

    function openModal(product) {
      currentProduct = product;
      const modal = document.getElementById('modal');
      modal.style.display = 'flex';

      document.getElementById('modalName').textContent = product.name;
      document.getElementById('modalPrice').textContent = product.price + '$';
      document.getElementById('modalDesc').textContent = product.desc || 'Описание отсутствует';

      const imagesContainer = document.getElementById('modalImages');
      imagesContainer.innerHTML = '';
      product.img.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        imagesContainer.appendChild(img);
      });
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function addCurrentToCart() {
      if (currentProduct) {
        const btn = document.querySelector('#modal .buy');
        const original = btn.textContent;
        btn.textContent = "✓ Добавлено";
        btn.classList.add('added');

        cart.push(currentProduct);
        updateCart();

        Telegram.WebApp.showToast(`✅ Добавлено: ${currentProduct.name}`);

        setTimeout(() => {
          btn.textContent = original;
          btn.classList.remove('added');
          closeModal();
        }, 1400);
      }
    }

    function updateCart() {
      document.getElementById('cart-count').textContent = cart.length;
      const container = document.getElementById('cart-items');
      container.innerHTML = '';
      let total = 0;

      cart.forEach((item, i) => {
        total += item.price;
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
          <img src="${item.img[0]}" style="width:70px;height:70px;object-fit:cover;border-radius:8px;">
          <span style="flex:1;margin-left:15px;">${item.name} — ${item.price}$</span>
          <button onclick="removeFromCart(${i})" style="color:#ff5555;background:none;border:none;font-size:24px;">✕</button>
        `;
        container.appendChild(div);
      });
      document.getElementById('total').textContent = total;
    }

    function removeFromCart(i) {
      cart.splice(i, 1);
      updateCart();
    }

    function checkout() {
      if (cart.length === 0) return;
      const btn = document.getElementById('checkoutBtn');
      const original = btn.textContent;
      btn.textContent = "Отправляем...";
      btn.classList.add('sending');

      const orderList = cart.map(item => `• ${item.name} — ${item.price}$`).join('\n');

      fetch(`https://api.telegram.org/bot8472467963:AAGbG_oLzzwXmN_zMWOVEvsrUx4jsY1Hb-8/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: 5882542766,
          text: `🛍 *Новый заказ с сайта!*\n\n` +
                `👤 Покупатель: ${Telegram.WebApp.initDataUnsafe.user.first_name || 'Пользователь'}\n` +
                `🆔 ID: ${Telegram.WebApp.initDataUnsafe.user.id}\n\n` +
                `📦 Товары:\n${orderList}\n\n` +
                `💰 Итого: ${document.getElementById('total').textContent}$`,
          parse_mode: "Markdown"
        })
      });

      Telegram.WebApp.showAlert("✅ Заказ отправлен менеджеру!\n\nОжидай сообщения.");

      cart = [];
      updateCart();

      setTimeout(() => {
        btn.textContent = original;
        btn.classList.remove('sending');
      }, 1800);
    }

    function showSection(section) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(section).classList.add('active');

      document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(btn => {
        if (btn.getAttribute('onclick').includes(`'${section}'`)) btn.classList.add('active');
      });

      if (section === 'shop') renderShop();
    }

    // Инициализация
    renderShop();
    showSection('home');
  </script>
</body>
</html>
