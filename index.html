<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEAD Archive SHOP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --red: #e60000; --dark: #0a0a0a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: url('https://kappa.lol/u39sUL.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(10,10,10,0.78), rgba(10,10,10,0.96));
      z-index: -1;
    }
    header {
      background: rgba(8, 8, 8, 0.98);
      backdrop-filter: blur(20px);
      padding: 35px 20px 25px;
      text-align: center;
      border-bottom: 5px solid var(--red);
    }
    h1 {
      font-size: 3.2em;
      font-weight: 900;
      letter-spacing: 8px;
      color: #ff1a1a;
      text-shadow: 0 0 45px rgba(230, 0, 0, 0.8);
    }
    .subtitle { color: #aaa; font-size: 1.15em; letter-spacing: 3px; margin-top: 8px; }
    nav {
      display: flex; flex-wrap: wrap; gap: 9px; padding: 18px;
      background: rgba(12, 12, 12, 0.97); backdrop-filter: blur(16px);
      justify-content: center;
    }
    nav button {
      padding: 14px 24px; background: rgba(28,28,28,0.9); border: 2px solid #444;
      color: #ddd; border-radius: 14px; cursor: pointer; font-weight: 600;
      transition: all 0.35s ease;
    }
    nav button:hover { transform: translateY(-3px); }
    nav button.active {
      background: var(--red); border-color: var(--red); color: white;
      box-shadow: 0 0 25px rgba(230, 0, 0, 0.5);
    }
    .section { display: none; padding: 25px 20px; min-height: 75vh; }
    .section.active { display: block; }

    #home .opium-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-top: 30px;
    }
    #home img {
      width: 100%;
      border-radius: 22px;
      box-shadow: 0 25px 65px rgba(192, 0, 0, 0.55);
      transition: transform 0.4s;
    }
    #home img:hover { transform: scale(1.03); }

    .promo {
      margin: 50px auto;
      max-width: 800px;
      background: rgba(20,20,20,0.85);
      border-radius: 20px;
      padding: 30px;
      border: 1px solid rgba(230,0,0,0.3);
      text-align: center;
    }
    .promo h2 { color: #ff3333; margin-bottom: 20px; font-size: 1.8em; }
    .promo ul { list-style: none; font-size: 1.2em; line-height: 2; }

    .filters { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
    .filter-btn {
      padding: 10px 20px;
      background: rgba(28,28,28,0.9);
      border: 2px solid #444;
      color: #ddd;
      border-radius: 12px;
      cursor: pointer;
    }
    .filter-btn.active { background: var(--red); border-color: var(--red); color: white; }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 26px;
    }
    .product {
      background: rgba(18,18,18,0.96);
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(192,0,0,0.35);
      transition: all 0.45s ease;
    }
    .product:hover { transform: translateY(-14px); box-shadow: 0 30px 75px rgba(192,0,0,0.8); }
    .product img { width: 100%; height: 255px; object-fit: cover; }
    .product-info { padding: 20px; text-align: center; }
    .price { color: #ff4444; font-size: 1.55em; font-weight: 700; }
    .price-grn { color: #ffaa44; font-size: 1.1em; }

    .pagination { display: flex; justify-content: center; gap: 12px; margin: 45px 0 30px; }
    .pagination button {
      padding: 12px 22px;
      background: rgba(34,34,34,0.9);
      border: 2px solid #555;
      color: #ddd;
      border-radius: 12px;
      cursor: pointer;
    }
    .pagination button.active, .pagination button:hover { background: var(--red); border-color: var(--red); }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.96);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: #121212;
      max-width: 540px;
      width: 94%;
      border-radius: 24px;
      overflow: hidden;
    }
    .modal-images {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 16px;
      background: #0a0a0a;
    }
    .modal-images img {
      max-width: 460px;
      height: 280px;
      object-fit: cover;
      border-radius: 16px;
      flex-shrink: 0;
    }
    .modal-info { padding: 26px; }
    .close {
      position: absolute; top: 22px; right: 26px;
      font-size: 40px; color: #fff; cursor: pointer; z-index: 10;
    }
    button.buy, .checkout-btn {
      width: 100%; padding: 18px; background: var(--red); border: none;
      color: white; border-radius: 14px; margin-top: 15px;
      font-weight: 700; transition: all 0.3s ease;
    }
    button.buy.added { background: #00cc66; transform: scale(1.06); }

    .cart-item {
      display: flex;
      align-items: center;
      background: rgba(25,25,25,0.95);
      padding: 16px;
      margin: 12px 0;
      border-radius: 16px;
    }

    /* Новое: поле телефона */
    #phone-input {
      width: 100%;
      padding: 14px;
      margin: 15px 0;
      background: #1a1a1a;
      border: 2px solid #444;
      color: white;
      border-radius: 12px;
      font-size: 1.1em;
    }

    footer {
      text-align: center;
      padding: 70px 20px 50px;
      color: #555;
      font-size: 0.95em;
    }
  </style>
</head>
<body>

    // ====================== УЛУЧШЕННАЯ CHECKOUT ======================
    function checkout() {
      if (cart.length === 0) {
        Telegram.WebApp.showAlert("Корзина пустая");
        return;
      }

      const phone = document.getElementById('phone-input').value.trim();
      if (!phone) {
        Telegram.WebApp.showAlert("Введите номер телефона!");
        return;
      }

      if (!confirm(`Подтверждаете заказ?\n\nНомер: ${phone}\nТоваров: ${cart.length}\nИтого: ${document.getElementById('total-usd').textContent}$`)) {
        return;
      }

      const totalUsd = cart.reduce((sum, item) => sum + item.price, 0);
      const totalUah = Math.round(totalUsd * USD_TO_UAH);
      const orderList = cart.map(item => `• ${item.name} — ${item.price}$`).join('\n');

      const user = Telegram.WebApp.initDataUnsafe?.user || {};
      const username = user.username ? `@${user.username}` : user.first_name || "Пользователь";

      const message = `🛍 *Новый заказ с DEAD Archive!*\n\n` +
                      `👤 Покупатель: ${username}\n` +
                      `🆔 ID: ${user.id || "Неизвестно"}\n` +
                      `📱 Телефон: ${phone}\n\n` +
                      `📦 Товары:\n${orderList}\n\n` +
                      `💰 Итого: ${totalUsd}$ (${totalUah} ₴)`;

      fetch('https://api.telegram.org/bot8472467963:AAGbG_oLzzwXmN_zMWOVEvsrUx4jsY1Hb-8/sendMessage', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: 5882542766,
          text: message,
          parse_mode: "Markdown"
        })
      })
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          Telegram.WebApp.showAlert(`✅ Заказ успешно отправлен!\nИтого: ${totalUsd}$`);
        } else {
          Telegram.WebApp.showAlert("❌ Ошибка отправки");
        }
      })
      .catch(() => Telegram.WebApp.showAlert("❌ Нет соединения"));

      cart = [];
      saveCart();
      updateCart();
    }
