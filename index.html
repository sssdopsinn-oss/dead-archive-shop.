<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEAD Archive SHOP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --accent: #ff0022; --neon: #ff3366; }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: url('https://kappa.lol/u39sUL.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(80,0,10,0.55), rgba(5,5,5,0.98));
      z-index: -1;
    }

    header {
      background: rgba(8, 8, 8, 0.96);
      backdrop-filter: blur(25px);
      padding: 45px 20px 35px;
      text-align: center;
      border-bottom: 7px solid var(--accent);
    }

    h1 {
      font-size: 3.6em;
      font-weight: 900;
      letter-spacing: 14px;
      color: var(--accent);
      text-shadow: 0 0 45px var(--neon);
    }

    nav {
      background: rgba(8,8,8,0.98);
      padding: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    nav button {
      padding: 14px 24px;
      background: #111;
      border: 2px solid #333;
      color: #ddd;
      border-radius: 12px;
      font-weight: 700;
      transition: all 0.4s;
    }

    nav button.active, nav button:hover {
      background: var(--accent);
      color: white;
      box-shadow: 0 0 25px rgba(255,0,34,0.6);
    }

    .section { display: none; padding: 25px 15px; min-height: 75vh; }
    .section.active { display: block; }

    .home-grid img { width: 100%; max-height: 280px; object-fit: cover; border-radius: 20px; }

    .search-bar { width: 100%; padding: 16px; margin: 20px 0; background: #111; border: 2px solid #444; border-radius: 14px; color: white; }

    .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 25px; }
    .product { background: rgba(15,15,15,0.95); border-radius: 22px; overflow: hidden; border: 1px solid rgba(255,0,34,0.25); transition: 0.4s; }
    .product:hover { transform: translateY(-10px); box-shadow: 0 25px 60px rgba(255,0,34,0.4); }

    .product img { width: 100%; height: 255px; object-fit: cover; }
    .price { font-size: 1.75em; font-weight: 900; color: var(--accent); }

    button.buy { background: linear-gradient(45deg, #ff0022, #ff3366); }
    button.buy.added { background: #22c55e !important; transform: scale(1.05); }

    footer { text-align: center; padding: 70px 20px 40px; color: #666; }
  </style>
</head>
<body>
  <header>
    <h1>DEAD ARCHIVE</h1>
    <p class="subtitle">OPIUM • ARCHIVE</p>
  </header>

  <nav>
    <button onclick="showSection('home')" class="active">Главная</button>
    <button onclick="showSection('shop')">Магазин</button>
    <button onclick="showSection('support')">Поддержка</button>
    <button onclick="showSection('cart')">Корзина (<span id="cart-count">0</span>)</button>
  </nav>

  <div id="home" class="section active">
    <div class="home-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;margin-top:25px;">
      <img src="https://kappa.lol/57GHW9" alt="">
      <img src="https://kappa.lol/nx0l01" alt="">
      <img src="https://kappa.lol/Abp4l7" alt="">
    </div>
  </div>

  <div id="shop" class="section">
    <h2 style="color:#ff3366; text-align:center; margin:20px 0 15px; font-size:2.3em;">КАТАЛОГ</h2>
    <input type="text" id="search-input" class="search-bar" placeholder="Поиск...">
    <div class="filters" id="filters"></div>
    <div class="product-grid" id="products"></div>
    <div class="pagination" id="pagination" style="margin:50px 0;display:flex;justify-content:center;gap:12px;"></div>
  </div>

  <div id="support" class="section">
    <h2 style="color:#ff3366; text-align:center; margin-bottom:30px;">Поддержка</h2>
    <p style="font-size:1.3em; text-align:center;">Пиши напрямую</p>
    <div style="text-align:center; margin-top:50px;">
      <a href="https://t.me/sssdopsinn" target="_blank" style="color:#ff3366; font-size:1.6em; font-weight:bold;">→ Написать в поддержку ←</a>
    </div>
  </div>

  <div id="cart" class="section">
    <h2 style="color:#ff3366; margin-bottom:25px;">Корзина</h2>
    <button onclick="clearCart()" style="margin-bottom:15px;padding:10px 20px;background:#333;color:#ddd;border:none;border-radius:8px;">Очистить</button>
    <div id="cart-items"></div>
    <h3 style="text-align:center;margin:30px 0;">Итого: <span id="total-usd">0</span>$</h3>
    <button onclick="checkout()" class="checkout-btn">Оформить заказ</button>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <div class="modal-images" id="modalImages" style="display:flex;overflow-x:auto;gap:10px;padding:16px;background:#0a0a0a;"></div>
      <div style="padding:26px;">
        <h2 id="modalName"></h2>
        <p class="price" id="modalPrice"></p>
        <p id="modalDesc"></p>
        <button onclick="addCurrentToCart()" class="buy">Добавить в корзину</button>
      </div>
    </div>
  </div>

  <footer>
    © 2026 Dead Archive Shop<br>
    <span style="color:#ff3366;">Создатель бота очень любит Дашу ❤️</span>
  </footer>

  <script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    const USD_TO_UAH = 41;
    let cart = [];
    let currentProduct = null;
    let currentPage = 1;
    let currentCategory = 'all';
    let searchQuery = '';

    const itemsPerPage = 6;

    const products = [
      {id:1, name:"Футболка Mowalola Double Sweat", price:50, category:"Футболки", img:["https://kappa.lol/cLC3CA.jpg","https://kappa.lol/3sjJSI.jpg","https://kappa.lol/fJbkmo.jpg","https://kappa.lol/Nu52GS.jpg"], desc:"Футболка Mowalola с двойным принтом"},
      {id:2, name:"Зип-Худи Grailz Project G/R", price:75, category:"Худи", img:["https://kappa.lol/IEzPpD.jpg","https://kappa.lol/VGOyOY.jpg","https://kappa.lol/kApzXs.jpg"], desc:"Тёплый зип-худи в стиле Grailz"},
      {id:3, name:"Джинсы Acne Studios", price:80, category:"Штаны", img:["https://kappa.lol/6aKBo5.jpg"], desc:"Широкие чёрные джинсы"},
      {id:4, name:"Худи Vetements Polizei", price:80, category:"Худи", img:["https://kappa.lol/9vC7xw.jpg","https://kappa.lol/j00CDM.jpg","https://kappa.lol/A8IFEN.jpg","https://kappa.lol/5w4C3w.jpg"], desc:"Культовая худи с полицейским принтом"},
      {id:5, name:"Штаны Maison Margiela", price:60, category:"Штаны", img:["https://kappa.lol/upj6ke.jpg","https://kappa.lol/LJY5sq.jpg","https://kappa.lol/6Shbdt.jpg"], desc:"Стильные штаны Maison Margiela"},
      {id:6, name:"Шорты Acne Studios", price:48, category:"Шорты", img:["https://kappa.lol/UDQ5kU.jpg","https://kappa.lol/JMHCaM.jpg","https://kappa.lol/HttpQq.jpg"], desc:"Комфортные шорты Acne Studios"},
      {id:7, name:"Худи Acne Studios Stockholm 1996", price:75, category:"Худи", img:["https://kappa.lol/WMQfJK.jpg","https://kappa.lol/pGk89F.jpg","https://kappa.lol/V9BdIW.jpg"], desc:"Худи в стиле 1996 года"},
      {id:8, name:"Футболка Balenciaga х Under Armour", price:45, category:"Футболки", img:["https://kappa.lol/AHnTaz.jpg","https://kappa.lol/6s04Ug.jpg"], desc:"Баленсиага в коллабе с Андер Армор"},
      {id:9, name:"Футболка Enfants Riches Deprimes", price:50, category:"Футболки", img:["https://kappa.lol/EYQ7dJ.jpg","https://kappa.lol/MXloXK.jpg"], desc:"Очень качественная футболка Enfants Riches Deprimes"},
      {id:10, name:"Футболка Erd Melancholy Rich Second Generation", price:50, category:"Футболки", img:["https://kappa.lol/o0PLJt.jpg","https://kappa.lol/0jmAGU.jpg"], desc:"Футболка Erd Melancholy Rich Second Generation"},
      {id:11, name:"Футболка Houli Crab ERD23FW", price:50, category:"Футболки", img:["https://kappa.lol/y5Wc2G.jpg","https://kappa.lol/50NFto.jpg"], desc:"Очень стильная футболка Houli Crab ERD"}
    ];

    function loadCart() {
      const saved = localStorage.getItem('deadarchive_cart');
      if (saved) cart = JSON.parse(saved);
      updateCart();
    }

    function saveCart() {
      localStorage.setItem('deadarchive_cart', JSON.stringify(cart));
    }

    function updateCart() {
      document.getElementById('cart-count').textContent = cart.length;
      const container = document.getElementById('cart-items');
      container.innerHTML = '';
      let total = 0;

      cart.forEach((item, i) => {
        total += item.price;
        const div = document.createElement('div');
        div.style.background = "rgba(25,25,25,0.95)";
        div.style.padding = "15px";
        div.style.margin = "10px 0";
        div.style.borderRadius = "16px";
        div.innerHTML = `
          <img src="${item.img[0]}" style="width:70px;height:70px;object-fit:cover;border-radius:10px;float:left;margin-right:15px;">
          <span style="display:block;">${item.name}</span>
          <span style="color:#ff3366;">${item.price}$</span>
          <button onclick="removeFromCart(${i})" style="float:right;color:#ff5555;border:none;background:none;font-size:24px;">✕</button>
        `;
        container.appendChild(div);
      });

      document.getElementById('total-usd').textContent = total;
      document.getElementById('total-uah').textContent = Math.round(total * USD_TO_UAH);
    }

    function removeFromCart(i) {
      cart.splice(i, 1);
      saveCart();
      updateCart();
    }

    function clearCart() {
      if (confirm("Очистить корзину?")) {
        cart = [];
        saveCart();
        updateCart();
      }
    }

    function getFilteredProducts() {
      let filtered = products;
      if (currentCategory !== 'all') filtered = filtered.filter(p => p.category === currentCategory);
      if (searchQuery) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
      return filtered;
    }

    function renderFilters() {
      const cats = ['all', 'Футболки', 'Худи', 'Штаны', 'Шорты'];
      const cont = document.getElementById('filters');
      cont.innerHTML = '';
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `filter-btn ${cat === currentCategory ? 'active' : ''}`;
        btn.textContent = cat === 'all' ? 'Все' : cat;
        btn.onclick = () => {
          currentCategory = cat;
          currentPage = 1;
          renderFilters();
          renderShop();
        };
        cont.appendChild(btn);
      });
    }

    function renderShop() {
      const cont = document.getElementById('products');
      cont.innerHTML = '';
      const filtered = getFilteredProducts();
      const start = (currentPage - 1) * itemsPerPage;
      const current = filtered.slice(start, start + itemsPerPage);

      current.forEach(p => {
        const div = document.createElement('div');
        div.className = 'product';
        div.onclick = () => openModal(p);
        div.innerHTML = `
          <img src="${p.img[0]}">
          <div class="product-info">
            <h3>${p.name}</h3>
            <p class="price">${p.price}$</p>
          </div>
        `;
        cont.appendChild(div);
      });
      renderPagination(filtered.length);
    }

    function renderPagination(total) {
      const pages = Math.ceil(total / itemsPerPage);
      const cont = document.getElementById('pagination');
      cont.innerHTML = '';
      for (let i = 1; i <= pages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.style.padding = "12px 20px";
        btn.style.background = i === currentPage ? "#ff0022" : "#111";
        btn.style.border = "2px solid #444";
        btn.style.color = "#ddd";
        btn.style.borderRadius = "12px";
        btn.onclick = () => { currentPage = i; renderShop(); };
        cont.appendChild(btn);
      }
    }

    function openModal(p) {
      currentProduct = p;
      document.getElementById('modal').style.display = 'flex';
      document.getElementById('modalName').textContent = p.name;
      document.getElementById('modalPrice').innerHTML = `${p.price}$ <span style="color:#ff3366">(${(p.price * USD_TO_UAH)} ₴)</span>`;
      document.getElementById('modalDesc').textContent = p.desc;

      const imgCont = document.getElementById('modalImages');
      imgCont.innerHTML = '';
      p.img.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.style.maxWidth = '100%';
        img.style.borderRadius = '12px';
        imgCont.appendChild(img);
      });
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function addCurrentToCart() {
      if (!currentProduct) return;
      cart.push(currentProduct);
      saveCart();
      updateCart();

      const btn = document.querySelector('#modal .buy');
      btn.textContent = "✓ Добавлено";
      btn.classList.add('added');

      Telegram.WebApp.showToast(`✅ ${currentProduct.name}`);

      setTimeout(() => {
        btn.textContent = "Добавить в корзину";
        btn.classList.remove('added');
        closeModal();
      }, 1400);
    }

    async function checkout() {
      if (cart.length === 0) return Telegram.WebApp.showAlert("Корзина пустая");

      const total = cart.reduce((sum, item) => sum + item.price, 0);
      const orderList = cart.map(item => `• ${item.name} — ${item.price}$`).join('\n');

      const user = Telegram.WebApp.initDataUnsafe?.user || {};
      const name = user.username ? `@${user.username}` : user.first_name || "Пользователь";

      const text = `🛍 Новый заказ!\n\n👤 ${name}\n🆔 ${user.id}\n\n${orderList}\n\n💰 Итого: ${total}$`;

      try {
        await fetch('https://api.telegram.org/bot8472467963:AAGbG_oLzzwXmN_zMWOVEvsrUx4jsY1Hb-8/sendMessage', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ chat_id: 5882542766, text: text, parse_mode: "Markdown" })
        });
      } catch(e) {}

      Telegram.WebApp.showAlert(`✅ Заказ отправлен!`);
      cart = [];
      saveCart();
      updateCart();
      showSection('home');
    }

    function showSection(sec) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(sec).classList.add('active');

      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => {
        if (b.getAttribute('onclick').includes(`'${sec}'`)) b.classList.add('active');
      });

      if (sec === 'shop') {
        currentPage = 1;
        renderFilters();
        renderShop();
      }
    }

    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value;
      currentPage = 1;
      renderShop();
    });

    loadCart();
    showSection('home');
  </script>
</body>
</html>
