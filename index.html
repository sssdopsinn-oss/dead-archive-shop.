<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEAD Archive SHOP • Реплика Из China</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --red: #c00; --dark: #0a0a0a; --gray: #1a1a1a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: var(--dark); color: #ddd; font-family: system-ui, sans-serif; }
    header { background: linear-gradient(#1a1a1a, #0a0a0a); padding: 15px; text-align: center; border-bottom: 3px solid var(--red); }
    h1 { color: var(--red); font-size: 2.2em; letter-spacing: 2px; }
    nav { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; padding: 15px; background: #111; }
    nav button { background: #1a1a1a; color: #ddd; border: 2px solid #333; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    nav button.active, nav button:hover { background: var(--red); color: white; border-color: var(--red); }
    .section { display: none; padding: 20px; min-height: 80vh; }
    .section.active { display: block; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
    .product { background: var(--gray); border-radius: 12px; overflow: hidden; border: 1px solid #333; }
    .product img { width: 100%; height: 200px; object-fit: cover; }
    .product-info { padding: 12px; text-align: center; }
    .price { color: var(--red); font-weight: bold; font-size: 1.3em; }
    button.buy { background: var(--red); color: white; border: none; width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px; font-weight: bold; }
    .cart-item { display: flex; justify-content: space-between; background: #1a1a1a; padding: 12px; margin: 10px 0; border-radius: 8px; }
    footer { text-align: center; padding: 25px; color: #666; }
  </style>
</head>
<body>

  <header>
    <h1>DEAD Archive</h1>
    <p>реплика • Архивная шмотка</p>
  </header>

  <nav>
    <button onclick="showSection('home')" class="active">Главная</button>
    <button onclick="showSection('shop')">Магазин</button>
    <button onclick="showSection('cart')">Корзина (<span id="cart-count">0</span>)</button>
    <button onclick="showSection('about')">О нас</button>
    <button onclick="showSection('support')">Поддержка</button>
  </nav>

  <div id="home" class="section active">
    <h2 style="text-align:center; color:#c00; margin:40px 0 20px;">ДОБРО ПОЖАЛОВАТЬ В DEAD ARCHIVE SHOP</h2>
    <p style="text-align:center; font-size:1.1em;">Реплики топового Archive / Opium шмота.</p>
  </div>

  <div id="shop" class="section">
    <h2 style="color:#c00; margin-bottom:20px;">Каталог шмота</h2>
    <div class="product-grid" id="products"></div>
  </div>

  <div id="cart" class="section">
    <h2 style="color:#c00;">Твоя корзина</h2>
    <div id="cart-items"></div>
    <h3 style="margin-top:20px;">Итого: <span id="total">0</span>$</h3>
    <button style="width:100%; padding:15px; background:#c00; margin-top:20px;" onclick="checkout()">Оформить заказ</button>
  </div>

  <div id="about" class="section">
    <h2>О нас</h2>
    <p>Dead Archive Shop — магазин реплик лучшего качества.</p>
  </div>

  <div id="support" class="section">
    <h2>Поддержка</h2>
    <p>Пиши менеджеру @sssdopsinn</p>
  </div>

  <footer>© 2026 Dead Archive Shop</footer>

  <script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    let cart = [];

    const products = [
      {id:1, name:"Футболка Mowalola Double Sweat", price:40, img:"https://kappa.lol/cLC3CA.jpg"},
      {id:2, name:"Зип-Худи Grailz Project G/R", price:75, img:"https://kappa.lol/IEzPpD.jpg"},
      {id:3, name:"Джинсы Acne Studios", price:80, img:"https://kappa.lol/6aKBo5.jpg"},
      {id:4, name:"Худи Vetements Polizei", price:90, img:"https://kappa.lol/aCimHO.jpg"}
    ];

    function renderProducts() {
      const container = document.getElementById('products');
      container.innerHTML = '';
      products.forEach(p => {const div = document.createElement('div');
        div.className = 'product';
        div.innerHTML = `
          <img src="${p.img}" alt="${p.name}">
          <div class="product-info">
            <h3>${p.name}</h3>
            <p class="price">${p.price}$</p>
            <button class="buy" onclick="addToCart(${p.id})">В корзину</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      if (product) {
        cart.push(product);
        updateCart();
        Telegram.WebApp.showToast(`Добавлено: ${product.name}`);
      }
    }

    function updateCart() {
      document.getElementById('cart-count').textContent = cart.length;
      const container = document.getElementById('cart-items');
      container.innerHTML = '';
      let total = 0;
      cart.forEach(item => {
        total += item.price;
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = <span>${item.name} — ${item.price}$</span>;
        container.appendChild(div);
      });
      document.getElementById('total').textContent = total;
    }

    function checkout() {
      if (cart.length === 0) return;

      const data = {
        action: "new_order",
        bot_token: "8799632323:AAFBuRpVIaEtCdqFpb_EImpdlrQayDRKOyg",   // ← твой токен
        order: cart,
        total: document.getElementById('total').textContent,
        user: Telegram.WebApp.initDataUnsafe.user
      };

      Telegram.WebApp.sendData(JSON.stringify(data));

      Telegram.WebApp.showAlert("✅ Заказ отправлен менеджеру!\n\nОжидай сообщения.");
      
      cart = [];
      updateCart();
    }

    function showSection(section) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(section).classList.add('active');
      document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
      const activeBtn = Array.from(document.querySelectorAll('nav button')).find(b => b.getAttribute('onclick').includes(`'${section}'`));
      if (activeBtn) activeBtn.classList.add('active');
    }

    renderProducts();
    showSection('home');
  </script>
</body>
</html>
