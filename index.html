<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEAD Archive SHOP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #ddd;
      font-family: system-ui, sans-serif;
    }
    header {
      background: #111;
      padding: 25px;
      text-align: center;
      border-bottom: 5px solid #c00;
    }
    h1 {
      color: #c00;
      margin: 0;
      font-size: 2.4em;
    }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 15px;
      background: #1a1a1a;
      justify-content: center;
    }
    nav button {
      padding: 14px 20px;
      background: #222;
      border: 2px solid #444;
      color: #ddd;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }
    nav button.active {
      background: #c00;
      border-color: #c00;
      color: white;
    }
    .section { display: none; padding: 20px; min-height: 70vh; }
    .section.active { display: block; }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 15px;
    }
    .product {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
    }
    .product img {
      width: 100%;
      height: 210px;
      object-fit: cover;
    }
    .product-info { padding: 15px; text-align: center; }
    .price { color: #c00; font-size: 1.4em; font-weight: bold; }
    button.buy {
      width: 100%;
      padding: 14px;
      background: #c00;
      border: none;
      color: white;
      border-radius: 8px;
      margin-top: 10px;
    }
    footer { text-align: center; padding: 40px 20px; color: #555; }
  </style>
</head>
<body>

  <header>
    <h1>DEAD Archive</h1>
    <p>реплика • Архивная шмотка</p>
  </header>

  <nav>
    <button onclick="showSection('home')" class="active">Главная</button>
    <button onclick="showSection('shop')">Магазин</button>
    <button onclick="showSection('cart')">Корзина (<span id="cart-count">0</span>)</button>
  </nav>

  <div id="home" class="section active">
    <h2 style="text-align:center; color:#c00; margin:60px 0 30px;">ДОБРО ПОЖАЛОВАТЬ В КУЛЬТ</h2>
    <p style="text-align:center; font-size:1.1em;">Реплики топового Archive шмота</p>
  </div>

  <div id="shop" class="section">
    <h2 style="color:#c00; margin-bottom:25px;">Каталог шмота</h2>
    <div class="product-grid" id="products"></div>
  </div>

  <div id="cart" class="section">
    <h2 style="color:#c00;">Твоя корзина</h2>
    <div id="cart-items"></div>
    <h3 style="margin:25px 0 10px;">Итого: <span id="total">0</span>$</h3>
    <button onclick="checkout()" style="width:100%; padding:16px; background:#c00; border:none; color:white; border-radius:10px; font-size:1.1em;">
      Оформить заказ
    </button>
  </div>

  <footer>
    © 2026 Dead Archive Shop
  </footer>

  <script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    let cart = [];

    const products = [
      {id:1, name:"Футболка Mowalola Double Sweat", price:40, img:"https://kappa.lol/cLC3CA.jpg"},
      {id:2, name:"Зип-Худи Grailz Project G/R", price:75, img:"https://kappa.lol/IEzPpD.jpg"},
      {id:3, name:"Джинсы Acne Studios", price:80, img:"https://kappa.lol/6aKBo5.jpg"},
      {id:4, name:"Худи Vetements Polizei", price:90, img:"https://kappa.lol/aCimHO.jpg"}
    ];

    function renderProducts() {
      const container = document.getElementById('products');
      container.innerHTML = '';
      products.forEach(p => {
        const div = document.createElement('div');
        div.className = 'product';
        div.innerHTML = `
          <img src="${p.img}">
          <div class="product-info">
            <h3>${p.name}</h3>
            <p class="price">${p.price}$</p>
            <button class="buy" onclick="addToCart(${p.id})">В корзину</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      if (product) {
        cart.push(product);
        updateCart();
        Telegram.WebApp.showToast(`Добавлено: ${product.name}`);
      }
    }

    function updateCart() {
      document.getElementById('cart-count').textContent = cart.length;
      const container = document.getElementById('cart-items');
      container.innerHTML = '';
      let total = 0;
      cart.forEach(item => {
        total += item.price;
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `${item.name} — ${item.price}$`;
        container.appendChild(div);
      });
      document.getElementById('total').textContent = total;
    }

    function checkout() {
      if (cart.length === 0) {
        Telegram.WebApp.showAlert("Корзина пустая");
        return;
      }

      const orderText = cart.map(item => `• ${item.name} — ${item.price}$`).join('\n');

      // Прямая отправка тебе в личку
      fetch(`https://api.telegram.org/bot8799632323:AAFBuRpVIaEtCdqFpb_EImpdlrQayDRKOyg/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: 5882542766,
          text: `🛍 *Новый заказ!*\n\n` +
                `👤 Покупатель: ${Telegram.WebApp.initDataUnsafe.user.first_name}\n` +
                `🆔 ID: ${Telegram.WebApp.initDataUnsafe.user.id}\n\n` +
                `📦 Товары:\n${orderText}\n\n` +
                `💰 Итого: ${document.getElementById('total').textContent}$`,
          parse_mode: "Markdown"
        })
      });

      Telegram.WebApp.showAlert("✅ Заказ отправлен менеджеру!\n\nОжидай сообщения.");

      cart = [];
      updateCart();
    }

    function showSection(section) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(section).classList.add('active');
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => {
        if (b.getAttribute('onclick').includes(section)) b.classList.add('active');
      });
    }

    renderProducts();
    showSection('home');
  </script>
</body>
</html>
